  </g>

  <!-- Chute -->
  <path d="M197,98 L185,112" fill="none" stroke="#aaa" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M197,98 L185,112" fill="none" stroke="#ccc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Concrete stream -->
  <path d="M184,114 Q179,122 175,130 Q172,136 170,144" fill="none" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <path d="M183,116 Q177,126 173,136 Q171,141 169,144" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

