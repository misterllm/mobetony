    <line x1="250" y1="110" x2="250" y2="125" stroke="#555" stroke-width="3" stroke-linecap="round"/>
    <line x1="207" y1="125" x2="255" y2="125" stroke="#555" stroke-width="3" stroke-linecap="round"/>
    <circle cx="217" cy="135" r="11" fill="#444" stroke="#555" stroke-width="1.5"/>
    <circle cx="217" cy="135" r="5" fill="#333" stroke="#555" stroke-width="0.8"/>
    <circle cx="245" cy="135" r="11" fill="#444" stroke="#555" stroke-width="1.5"/>
